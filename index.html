<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed-AI | منصة الذكاء الاصطناعي</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #050510; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .header { margin-top: 30px; }
        .logo-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #fbc531; margin-bottom: 15px; object-fit: cover; box-shadow: 0 0 20px rgba(251, 197, 49, 0.4); }
        h1 { color: #fbc531; font-size: 2.5rem; margin: 5px 0; }
        .ai-container { background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; margin-top: 30px; border: 1px solid rgba(251, 197, 49, 0.2); }
        
        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; color: #fbc531; font-weight: bold; }
        input[type="file"], textarea { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #1a1a2e; color: white; box-sizing: border-box; }
        textarea { height: 100px; resize: none; }
        
        .gen-btn { background: linear-gradient(45deg, #fbc531, #e1b12c); color: #0a0a23; padding: 15px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .gen-btn:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(251, 197, 49, 0.5); }
        
        #status { margin-top: 15px; font-size: 0.9rem; color: #aaa; display: none; }
        .footer-tag { margin-top: auto; padding: 20px; font-size: 0.7rem; color: #333; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://i.postimg.cc/SsMPRn2x/IMG-1726.jpg" alt="Ahmed-AI" class="logo-img">
        <h1>Ahmed-AI</h1>
        <p>حوّل صورك إلى مقاطع فيديو احترافية بالذكاء الاصطناعي</p>
    </div>

    <div class="ai-container">
        <div class="input-group">
            <label>1. ارفع صورتك الشخصية:</label>
            <input type="file" id="userImage" accept="image/*">
        </div>

        <div class="input-group">
            <label>2. اكتب وصف الفيديو (Prompt):</label>
            <textarea id="userPrompt" placeholder="مثلاً: اجعل الصورة تتحدث بطلاقة عن التكنولوجيا..."></textarea>
        </div>

        <button class="gen-btn" onclick="generateVideo()">✨ إنشاء المقطع الآن</button>
        
        <div id="status">جاري معالجة البيانات بواسطة Ahmed-AI...</div>
    </div>

    <div class="footer-tag">DEVELOPED BY AHMED MOHAMMED ABDULRAHMAN | POWERED BY DAMON ENGINE</div>

    <script>
        function generateVideo() {
            const img = document.getElementById('userImage').value;
            const prompt = document.getElementById('userPrompt').value;
            const status = document.getElementById('status');

            if(!img || !prompt) {
                alert("يا أحمد، لازم ترفع صورة وتكتب الشرح أولاً!");
                return;
            }

            status.style.display = "block";
            
            // محاكاة لعملية التوليد
            setTimeout(() => {
                alert("تم استلام طلبك في Ahmed-AI! جاري التوليد وإرسال المقطع لرقمك: 971543496968");
                status.style.display = "none";
            }, 3000);
        }
    </script>
</body>
</html>
