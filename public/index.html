<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed-AI | بوابة توليد الفيديو</title>
    <style>
        :root {
            --primary-gold: #d4af37;
            --bg-overlay: rgba(10, 10, 12, 0.85); /* طبقة شفافة فوق الخلفية */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* جعل الصورة خلفية كاملة للشاشة */
        .full-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop'); /* يمكنك تغيير الرابط بصورتك */
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-overlay); /* تظليل فوق الخلفية لراحة العين */
            padding: 20px;
        }

        .logo-container img {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            border: 2px solid var(--primary-gold);
            margin-bottom: 10px;
        }

        h1 {
            color: var(--primary-gold);
            margin: 0;
            font-size: 2rem;
        }

        .main-card {
            background: rgba(22, 22, 26, 0.95);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--primary-gold);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            margin-top: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary-gold);
            font-weight: bold;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #3a3a3e;
            background: #0a0a0c;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .upload-area {
            border: 2px dashed var(--primary-gold);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
        }

        button {
            background: linear-gradient(45deg, #d4af37, #f2d06b);
            color: black;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.02); }

        #result-area {
            display: none;
            margin-top: 20px;
            text-align: center;
        }

        footer {
            margin-top: 30px;
            text-align: center;
            color: white;
        }

        .dev-btn {
            color: var(--primary-gold);
            text-decoration: none;
            border: 1px solid var(--primary-gold);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="full-background"></div>

    <div class="container">
        <div class="logo-container">
            <img src="https://i.postimg.cc/kGR2w7fj/IMG-1936.jpg" alt="Logo">
        </div>
        <h1>Ahmed-AI</h1>

        <div class="main-card">
            <div class="input-group">
                <label>1. الصورة الأساسية</label>
                <div class="upload-area" onclick="document.getElementById('imageInput').click()">
                    <span id="fileName">اضغط هنا لرفع الصورة</span>
                    <input type="file" id="imageInput" style="display: none;" onchange="updateFileName()">
                </div>
            </div>

            <div class="input-group">
                <label>2. شرح التصميم (Prompt)</label>
                <textarea id="promptInput" rows="3" placeholder="اكتب ماذا تريد أن يحدث في المقطع..."></textarea>
            </div>

            <button onclick="generateVideo()">✨ ابدأ التصميم الآن</button>

            <div id="result-area">
                <p id="statusText">جاري معالجة طلبك...</p>
            </div>
        </div>

        <footer>
            <p>DEVELOPED BY AHMED MOHAMMED ABDULRAHMAN</p>
            <a href="https://wa.me/971543496968" class="dev-btn">تواصل مع المطور</a>
        </footer>
    </div>

    <script>
        function updateFileName() {
            const input = document.getElementById('imageInput');
            document.getElementById('fileName').innerText = input.files[0].name;
        }

        function generateVideo() {
            const resultArea = document.getElementById('result-area');
            const statusText = document.getElementById('statusText');
            
            resultArea.style.display = 'block';
            statusText.innerText = "جاري إرسال البيانات للخادم...";

            // ملاحظة: هنا نحتاج لربط الـ API الخاص بـ index.js
            console.log("تم ضغط الزر، بانتظار ملف الـ Backend");
        }
    </script>
</body>
</html>
